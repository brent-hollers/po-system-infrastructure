name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"

# TODO: populate env vars (bucket name, CloudFront distribution ID, AWS region)
# once infrastructure is provisioned.
env:
  AWS_REGION: us-east-1
  # Set these as GitHub Actions repository variables after `terraform apply`:
  #   S3_BUCKET            — from `terraform output s3_bucket_name`
  #   CF_DISTRIBUTION_ID   — from `terraform output cloudfront_distribution_id`
  S3_BUCKET: ${{ vars.S3_BUCKET }}
  CF_DISTRIBUTION_ID: ${{ vars.CF_DISTRIBUTION_ID }}

jobs:
  deploy:
    name: Sync to S3 & Invalidate CloudFront
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync frontend to S3
        run: |
          aws s3 sync frontend/ s3://${{ env.S3_BUCKET }}/ \
            --delete \
            --cache-control "max-age=86400"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CF_DISTRIBUTION_ID }} \
            --paths "/*"
